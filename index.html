<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カクイチ社食レジ</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at top left, #ffe08a 0%, transparent 22%),
        radial-gradient(circle at top right, #ffb3c7 0%, transparent 25%),
        radial-gradient(circle at bottom left, #9be7ff 0%, transparent 22%),
        linear-gradient(180deg, #fff8e7 0%, #ffeef5 100%);
      color: #5b3b00;
      min-height: 100vh;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 16px 40px;
    }

    .header {
      text-align: center;
      margin-bottom: 18px;
    }

    .header h1 {
      margin: 0;
      font-size: 34px;
      line-height: 1.2;
      color: #ff6b6b;
      text-shadow: 0 2px 0 #fff;
    }

    .header p {
      margin: 10px 0 0;
      font-size: 15px;
      color: #7a5a00;
      font-weight: 700;
    }

    .card {
      background: #ffffffcc;
      backdrop-filter: blur(6px);
      border: 3px solid #fff;
      border-radius: 24px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(255, 107, 107, 0.18);
      margin-bottom: 16px;
    }

    .label {
      display: block;
      font-size: 15px;
      font-weight: 800;
      margin-bottom: 8px;
      color: #ff6b6b;
    }

    select {
      width: 100%;
      border: 3px solid #ffd166;
      border-radius: 16px;
      padding: 14px 16px;
      font-size: 16px;
      background: #fffdf7;
      color: #5b3b00;
      font-weight: 700;
      outline: none;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-top: 14px;
    }

    button {
      border: none;
      border-radius: 18px;
      padding: 16px 16px;
      font-size: 18px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.05s ease, opacity 0.2s ease;
      box-shadow: 0 6px 0 rgba(0,0,0,0.08);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 3px 0 rgba(0,0,0,0.08);
    }

    .start-btn {
      background: linear-gradient(180deg, #7ee787 0%, #2ecc71 100%);
      color: #fff;
    }

    .stop-btn {
      background: linear-gradient(180deg, #ffd6a5 0%, #ffad66 100%);
      color: #7a3900;
    }

    .status-card {
      text-align: center;
      padding: 18px;
    }

    .status-badge {
      display: inline-block;
      min-width: 220px;
      padding: 12px 18px;
      border-radius: 999px;
      font-size: 19px;
      font-weight: 900;
      background: #fff3b0;
      color: #8a5a00;
      border: 3px solid #fff;
    }

    .result-card {
      text-align: center;
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #ffffff 0%, #fff8ef 100%);
    }

    #result {
      font-size: 30px;
      font-weight: 900;
      color: #00a896;
      white-space: pre-line;
      word-break: break-word;
      text-shadow: 0 2px 0 #fff;
    }

    #reader {
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      overflow: hidden;
      border-radius: 20px;
    }

    .reader-card {
      padding: 14px;
      background: linear-gradient(180deg, #ffffff 0%, #eefcff 100%);
    }

    .footer-note {
      text-align: center;
      font-size: 14px;
      color: #8a5a00;
      margin-top: 6px;
      font-weight: 700;
    }

    .emoji-row {
      text-align: center;
      font-size: 26px;
      margin-bottom: 8px;
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 28px;
      }

      .button-row {
        grid-template-columns: 1fr;
      }

      #result {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="emoji-row">🍴✨📱✨</div>
      <h1>社食レジ</h1>
      <p>QRコードをかざして受付してね！</p>
    </div>

    <div class="card">
      <label class="label" for="cameraSelect">📷 カメラをえらぶ</label>
      <select id="cameraSelect">
        <option>カメラを読み込み中...</option>
      </select>

      <div class="button-row">
        <button id="startBtn" class="start-btn">読み取りスタート</button>
        <button id="stopBtn" class="stop-btn">ストップ</button>
      </div>
    </div>

    <div class="card status-card">
      <div id="msg" class="status-badge">カメラを選んで開始してね</div>
    </div>

    <div class="card result-card">
      <div id="result"></div>
    </div>

    <div class="card reader-card">
      <div id="reader"></div>
    </div>

    <div class="footer-note">
      読み取り後は自動で次の受付待ちになるよ
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwuHOAN8M8YdYFo7Wpex9wzEP5QRVsksSDKOuyq3Tyo1nBo6riHLrVs-9MADrZa-yvA/exec";

    const cameraSelect = document.getElementById("cameraSelect");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const msg = document.getElementById("msg");
    const result = document.getElementById("result");

    let html5QrCode = null;
    let isRunning = false;
    let isProcessing = false;
    let resetTimer = null;
    let audioContext = null;

    function initAudio() {
      if (!audioContext) {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (AudioCtx) {
          audioContext = new AudioCtx();
        }
      }
      if (audioContext && audioContext.state === "suspended") {
        audioContext.resume().catch(() => {});
      }
    }

    function playSuccessSound() {
      if (!audioContext) return;

      const now = audioContext.currentTime;

      const osc1 = audioContext.createOscillator();
      const gain1 = audioContext.createGain();
      osc1.type = "sine";
      osc1.frequency.setValueAtTime(880, now);
      gain1.gain.setValueAtTime(0.0001, now);
      gain1.gain.exponentialRampToValueAtTime(0.18, now + 0.02);
      gain1.gain.exponentialRampToValueAtTime(0.0001, now + 0.18);
      osc1.connect(gain1);
      gain1.connect(audioContext.destination);
      osc1.start(now);
      osc1.stop(now + 0.2);

      const osc2 = audioContext.createOscillator();
      const gain2 = audioContext.createGain();
      osc2.type = "sine";
      osc2.frequency.setValueAtTime(1318, now + 0.12);
      gain2.gain.setValueAtTime(0.0001, now + 0.12);
      gain2.gain.exponentialRampToValueAtTime(0.16, now + 0.14);
      gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.32);
      osc2.connect(gain2);
      gain2.connect(audioContext.destination);
      osc2.start(now + 0.12);
      osc2.stop(now + 0.34);
    }

    function setStatus(text, mode = "normal") {
      msg.innerText = text;

      if (mode === "success") {
        msg.style.background = "#d9ffd6";
        msg.style.color = "#18794e";
      } else if (mode === "error") {
        msg.style.background = "#ffd9de";
        msg.style.color = "#b42318";
      } else if (mode === "loading") {
        msg.style.background = "#fff1a8";
        msg.style.color = "#8a5a00";
      } else {
        msg.style.background = "#fff3b0";
        msg.style.color = "#8a5a00";
      }
    }

    async function sendToGas(employeeId) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);

      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({ employeeId }),
          signal: controller.signal
        });

        const text = await response.text();
        return JSON.parse(text);
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function loadCameras() {
      try {
        setStatus("カメラ一覧を取得中...", "loading");

        const devices = await Html5Qrcode.getCameras();
        cameraSelect.innerHTML = "";

        if (!devices || devices.length === 0) {
          cameraSelect.innerHTML = "<option>カメラが見つかりません</option>";
          setStatus("カメラが見つかりません", "error");
          return;
        }

        devices.forEach((device, index) => {
          const option = document.createElement("option");
          option.value = device.id;
          option.textContent = device.label && device.label.trim()
            ? device.label
            : `カメラ ${index + 1}`;
          cameraSelect.appendChild(option);
        });

        setStatus("カメラを選んで開始してね");
      } catch (err) {
        console.error(err);
        setStatus("カメラ取得に失敗しました", "error");
      }
    }

    function scheduleReset() {
      if (resetTimer) clearTimeout(resetTimer);

      resetTimer = setTimeout(() => {
        result.innerText = "";
        setStatus("次のQRをどうぞ");
        isProcessing = false;
      }, 2500);
    }

    async function startScanner() {
      try {
        initAudio();

        if (isRunning) {
          setStatus("すでに読み取り中です");
          return;
        }

        const cameraId = cameraSelect.value;
        if (!cameraId) {
          setStatus("カメラを選んでください", "error");
          return;
        }

        result.innerText = "";
        setStatus("カメラを起動中...", "loading");

        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode("reader");
        }

        await html5QrCode.start(
          cameraId,
          {
            fps: 10,
            qrbox: 250
          },
          async (decodedText) => {
            if (isProcessing) return;
            isProcessing = true;

            try {
              result.innerText = "読み取りました";
              setStatus("登録中...", "loading");

              const res = await sendToGas(decodedText);

              if (res.ok) {
                result.innerText = "登録しました 🎉";
                setStatus("登録完了", "success");
                playSuccessSound();
              } else {
                result.innerText = "";
                setStatus("登録できませんでした", "error");
              }
            } catch (err) {
              console.error(err);
              result.innerText = "";
              setStatus("登録できませんでした", "error");
            } finally {
              scheduleReset();
            }
          },
          () => {
          }
        );

        isRunning = true;
        setStatus("QRを読み取ってね");
      } catch (err) {
        console.error(err);
        setStatus("カメラ起動エラー", "error");
      }
    }

    async function stopScanner() {
      try {
        if (!html5QrCode || !isRunning) {
          setStatus("停止中です");
          return;
        }

        await html5QrCode.stop();
        isRunning = false;
        isProcessing = false;

        if (resetTimer) {
          clearTimeout(resetTimer);
          resetTimer = null;
        }

        result.innerText = "";
        setStatus("停止しました");
      } catch (err) {
        console.error(err);
        setStatus("停止エラー", "error");
      }
    }

    startBtn.addEventListener("click", startScanner);
    stopBtn.addEventListener("click", stopScanner);

    loadCameras();
  </script>
</body>
</html>
