<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>カクイチ社食レジ</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background: #f7f3ea;
      color: #2f241a;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .screen {
      width: 100%;
      max-width: 700px;
      height: 100vh;
      padding: 14px 18px 18px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: var(--bg, #f7f3ea);
      transition: background 0.25s ease;
    }

    .screen.state-normal {
      --bg: #f7f3ea;
    }

    .screen.state-success {
      --bg: #d8ef2d;
    }

    .screen.state-error {
      --bg: #ef533f;
    }

    .screen.state-duplicate {
      --bg: #efc94a;
    }

    .topbar {
      text-align: center;
      padding-top: 4px;
    }

    .message {
      font-size: 34px;
      font-weight: 800;
      line-height: 1.25;
      white-space: pre-line;
      letter-spacing: 0.02em;
      margin: 0;
    }

    .submessage {
      margin-top: 8px;
      font-size: 18px;
      font-weight: 700;
      opacity: 0.9;
      min-height: 28px;
    }

    .main {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
    }

    .reader-wrap {
      width: min(78vw, 430px);
      height: min(78vw, 430px);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #reader {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #e8efef;
      border-radius: 4px;
      position: relative;
    }

    #reader video {
      width: 100% !important;
      height: 100% !important;
      object-fit: cover !important;
      border-radius: 4px;
    }

    .corner {
      position: absolute;
      width: 34px;
      height: 34px;
      border-color: #5d4c3b;
      border-style: solid;
      border-width: 0;
      pointer-events: none;
    }

    .corner.tl {
      top: -10px;
      left: -10px;
      border-top-width: 5px;
      border-left-width: 5px;
      border-top-left-radius: 10px;
    }

    .corner.tr {
      top: -10px;
      right: -10px;
      border-top-width: 5px;
      border-right-width: 5px;
      border-top-right-radius: 10px;
    }

    .corner.bl {
      bottom: -10px;
      left: -10px;
      border-bottom-width: 5px;
      border-left-width: 5px;
      border-bottom-left-radius: 10px;
    }

    .corner.br {
      bottom: -10px;
      right: -10px;
      border-bottom-width: 5px;
      border-right-width: 5px;
      border-bottom-right-radius: 10px;
    }

    .bottom {
      display: grid;
      grid-template-columns: 1fr auto auto;
      gap: 8px;
      align-items: end;
      padding-bottom: env(safe-area-inset-bottom);
    }

    select, button {
      border: 2px solid #4f4338;
      background: rgba(255,255,255,0.72);
      color: #2f241a;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 15px;
      font-weight: 700;
      min-height: 46px;
    }

    select {
      width: 100%;
      min-width: 0;
    }

    button {
      cursor: pointer;
      min-width: 86px;
    }

    .result-pill {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.82);
      border: 2px solid #4f4338;
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 15px;
      font-weight: 800;
      max-width: 90%;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 640px) {
      .screen {
        padding: 10px 12px 12px;
      }

      .message {
        font-size: 28px;
      }

      .submessage {
        font-size: 16px;
      }

      .reader-wrap {
        width: min(82vw, 380px);
        height: min(82vw, 380px);
      }

      .bottom {
        grid-template-columns: 1fr 1fr;
      }

      select {
        grid-column: 1 / -1;
      }
    }
  </style>
</head>
<body>
  <div id="screen" class="screen state-normal">
    <div class="topbar">
      <p id="message" class="message">QRコードを
かざしてください</p>
      <div id="submessage" class="submessage"></div>
    </div>

    <div class="main">
      <div class="reader-wrap">
        <div id="reader"></div>

        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>

        <div id="resultPill" class="result-pill hidden"></div>
      </div>
    </div>

    <div class="bottom">
      <select id="cameraSelect">
        <option>カメラを読み込み中...</option>
      </select>
      <button id="startBtn">開始</button>
      <button id="stopBtn">停止</button>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwuHOAN8M8YdYFo7Wpex9wzEP5QRVsksSDKOuyq3Tyo1nBo6riHLrVs-9MADrZa-yvA/exec";

    const screen = document.getElementById("screen");
    const message = document.getElementById("message");
    const submessage = document.getElementById("submessage");
    const resultPill = document.getElementById("resultPill");
    const cameraSelect = document.getElementById("cameraSelect");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");

    let html5QrCode = null;
    let isRunning = false;
    let isProcessing = false;
    let resetTimer = null;
    let audioContext = null;

    function initAudio() {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return;

      if (!audioContext) {
        audioContext = new AudioCtx();
      }

      if (audioContext.state === "suspended") {
        audioContext.resume().catch(() => {});
      }

      const buffer = audioContext.createBuffer(1, 1, 22050);
      const source = audioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(audioContext.destination);
      source.start(0);
    }

    function beep(freq, start, duration, volume, type = "sine") {
      if (!audioContext) return;

      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.start(start);
      osc.stop(start + duration + 0.02);
    }

    function playSuccessSound() {
      if (!audioContext) return;
      const now = audioContext.currentTime;
      beep(1046, now, 0.12, 0.5, "triangle");
      beep(1568, now + 0.10, 0.2, 0.42, "triangle");
    }

    function playErrorSound() {
      if (!audioContext) return;
      const now = audioContext.currentTime;
      beep(320, now, 0.18, 0.42, "sawtooth");
      beep(220, now + 0.12, 0.22, 0.42, "sawtooth");
    }

    function setScreenState(mode) {
      screen.className = "screen";
      screen.classList.add(`state-${mode}`);
    }

    function setNormalView() {
      setScreenState("normal");
      message.innerText = "QRコードを\nかざしてください";
      submessage.innerText = "";
      resultPill.classList.add("hidden");
      resultPill.innerText = "";
    }

    function setLoadingView() {
      setScreenState("normal");
      message.innerText = "QRコードを\nかざしてください";
      submessage.innerText = "読み取り中...";
      resultPill.classList.add("hidden");
      resultPill.innerText = "";
    }

    function setSuccessView() {
      setScreenState("success");
      message.innerText = "読み込み完了\nHave a nice day!";
      submessage.innerText = "";
      resultPill.classList.remove("hidden");
      resultPill.innerText = "登録しました";
    }

    function setErrorView() {
      setScreenState("error");
      message.innerText = "ERROR!\nもう1度 かざしてください。";
      submessage.innerText = "";
      resultPill.classList.remove("hidden");
      resultPill.innerText = "登録できませんでした";
    }

    function setDuplicateView() {
      setScreenState("duplicate");
      message.innerText = "今日は登録済みです\nまた あしたも 来てね ☺";
      submessage.innerText = "";
      resultPill.classList.remove("hidden");
      resultPill.innerText = "本日は登録ずみです";
    }

    async function sendToGas(employeeId) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);

      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({ employeeId }),
          signal: controller.signal
        });

        const text = await response.text();
        return JSON.parse(text);
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function loadCameras() {
      try {
        const devices = await Html5Qrcode.getCameras();
        cameraSelect.innerHTML = "";

        if (!devices || devices.length === 0) {
          cameraSelect.innerHTML = "<option>カメラが見つかりません</option>";
          return;
        }

        devices.forEach((device, index) => {
          const option = document.createElement("option");
          option.value = device.id;
          option.textContent = device.label && device.label.trim()
            ? device.label
            : `カメラ ${index + 1}`;
          cameraSelect.appendChild(option);
        });

        const options = Array.from(cameraSelect.options);
        const rearOption = options.find(opt => !/front/i.test(opt.textContent));
        if (rearOption) {
          cameraSelect.value = rearOption.value;
        }
      } catch (err) {
        console.error(err);
      }
    }

    function scheduleReset() {
      if (resetTimer) clearTimeout(resetTimer);
      resetTimer = setTimeout(() => {
        isProcessing = false;
        setNormalView();
      }, 2200);
    }

    async function startScanner() {
      try {
        initAudio();

        if (isRunning) return;

        const cameraId = cameraSelect.value;
        if (!cameraId) return;

        setLoadingView();

        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode("reader");
        }

        await html5QrCode.start(
          cameraId,
          {
            fps: 10,
            qrbox: 280
          },
          async (decodedText) => {
            if (isProcessing) return;
            isProcessing = true;

            try {
              const res = await sendToGas(decodedText);

              if (res.ok) {
                setSuccessView();
                playSuccessSound();
              } else if (res.code === "ALREADY_CHECKED_IN") {
                setDuplicateView();
                playErrorSound();
              } else {
                setErrorView();
                playErrorSound();
              }
            } catch (err) {
              console.error(err);
              setErrorView();
              playErrorSound();
            } finally {
              scheduleReset();
            }
          },
          () => {}
        );

        isRunning = true;
        setNormalView();
      } catch (err) {
        console.error(err);
        setErrorView();
      }
    }

    async function stopScanner() {
      try {
        if (!html5QrCode || !isRunning) return;

        await html5QrCode.stop();
        isRunning = false;
        isProcessing = false;

        if (resetTimer) {
          clearTimeout(resetTimer);
          resetTimer = null;
        }

        setNormalView();
      } catch (err) {
        console.error(err);
      }
    }

    startBtn.addEventListener("click", () => {
      initAudio();
      startScanner();
    });

    stopBtn.addEventListener("click", stopScanner);

    setNormalView();
    loadCameras();
  </script>
</body>
</html>
