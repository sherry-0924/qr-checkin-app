<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カクイチ社食レジ</title>

  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }

    h1 {
      margin-bottom: 12px;
    }

    #controls {
      margin: 16px 0;
    }

    select, button {
      font-size: 16px;
      padding: 10px 14px;
      margin: 6px;
      max-width: 90%;
    }

    #reader {
      width: 100%;
      max-width: 400px;
      margin: 20px auto;
    }

    #msg {
      margin-top: 12px;
      font-size: 16px;
      white-space: pre-line;
    }

    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #0a7a2f;
      white-space: pre-line;
      word-break: break-all;
    }
  </style>
</head>
<body>
  <h1>🍴 社食レジ</h1>

  <div id="controls">
    <div>
      <select id="cameraSelect">
        <option>カメラを読み込み中...</option>
      </select>
    </div>
    <div>
      <button id="startBtn">QR読み取り開始</button>
      <button id="stopBtn">停止</button>
    </div>
  </div>

  <div id="reader"></div>
  <p id="msg">カメラを選んで開始してください</p>
  <div id="result"></div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwuHOAN8M8YdYFo7Wpex9wzEP5QRVsksSDKOuyq3Tyo1nBo6riHLrVs-9MADrZa-yvA/exec";

    const cameraSelect = document.getElementById("cameraSelect");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const msg = document.getElementById("msg");
    const result = document.getElementById("result");

    let html5QrCode = null;
    let isRunning = false;
    let isProcessing = false;
    let resetTimer = null;

    async function sendToGas(employeeId) {
      const response = await fetch(GAS_URL, {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },
        body: JSON.stringify({ employeeId })
      });

      const text = await response.text();
      return JSON.parse(text);
    }

    async function loadCameras() {
      try {
        msg.innerText = "カメラ一覧を取得しています...";

        const devices = await Html5Qrcode.getCameras();
        cameraSelect.innerHTML = "";

        if (!devices || devices.length === 0) {
          cameraSelect.innerHTML = "<option>カメラが見つかりません</option>";
          msg.innerText = "❌ カメラが見つかりません";
          return;
        }

        devices.forEach((device, index) => {
          const option = document.createElement("option");
          option.value = device.id;
          option.textContent = device.label && device.label.trim()
            ? device.label
            : `カメラ ${index + 1}`;
          cameraSelect.appendChild(option);
        });

        msg.innerText = "カメラを選んで開始してください";
      } catch (err) {
        console.error(err);
        msg.innerText = "❌ カメラ一覧の取得に失敗しました: " + err.name;
      }
    }

    function resetForNextScan() {
      result.innerText = "";
      msg.innerText = "次のQRを読み取ってください";
      isProcessing = false;
    }

    async function startScanner() {
      try {
        if (isRunning) {
          msg.innerText = "すでに読み取り中です";
          return;
        }

        const cameraId = cameraSelect.value;
        if (!cameraId) {
          msg.innerText = "❌ カメラを選んでください";
          return;
        }

        msg.innerText = "カメラを起動しています...";
        result.innerText = "";

        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode("reader");
        }

        await html5QrCode.start(
          cameraId,
          {
            fps: 10,
            qrbox: 250
          },
          async (decodedText) => {
            if (isProcessing) return;
            isProcessing = true;

            try {
              result.innerText = "読み取り結果: " + decodedText;
              msg.innerText = "送信しています...";

              const res = await sendToGas(decodedText);

              if (res.ok) {
  result.innerText = "登録しました";
  msg.innerText = "✅ 登録完了";
} else {
  result.innerText = "";
  msg.innerText = "❌ 登録できませんでした";
}
            } catch (err) {
              console.error(err);
              msg.innerText = "❌ 送信エラー";
            }

            if (resetTimer) clearTimeout(resetTimer);
            resetTimer = setTimeout(resetForNextScan, 2500);
          },
          () => {
            // 読み取り失敗時は何もしない
          }
        );

        isRunning = true;
        msg.innerText = "QRを読み取ってください";
      } catch (err) {
        console.error(err);
        msg.innerText = "❌ エラー: " + err.name;
      }
    }

    async function stopScanner() {
      try {
        if (!html5QrCode || !isRunning) {
          msg.innerText = "停止中です";
          return;
        }

        await html5QrCode.stop();
        isRunning = false;
        isProcessing = false;
        if (resetTimer) clearTimeout(resetTimer);
        msg.innerText = "⏹ 停止しました";
      } catch (err) {
        console.error(err);
        msg.innerText = "❌ 停止エラー: " + err.name;
      }
    }

    startBtn.addEventListener("click", startScanner);
    stopBtn.addEventListener("click", stopScanner);

    loadCameras();
  </script>
</body>
</html>
