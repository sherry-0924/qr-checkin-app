<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>カクイチ社食レジ</title>
  <script src="https://unpkg.com/html5-qrcode"></script>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Hiragino Maru Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background:
        radial-gradient(circle at top left, #ffe08a 0%, transparent 22%),
        radial-gradient(circle at top right, #ffb3c7 0%, transparent 25%),
        radial-gradient(circle at bottom left, #9be7ff 0%, transparent 22%),
        linear-gradient(180deg, #fff8e7 0%, #ffeef5 100%);
      color: #5b3b00;
    }

    body {
      display: flex;
      align-items: stretch;
      justify-content: center;
    }

    .container {
      width: 100%;
      max-width: 560px;
      height: 100vh;
      padding: 10px 12px 12px;
      display: grid;
      grid-template-rows: auto auto auto 1fr auto;
      gap: 10px;
    }

    .header {
      text-align: center;
    }

    .emoji-row {
      font-size: 20px;
      line-height: 1.1;
      margin-bottom: 2px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      color: #ff6b6b;
      text-shadow: 0 2px 0 #fff;
    }

    .header p {
      margin: 4px 0 0;
      font-size: 13px;
      color: #7a5a00;
      font-weight: 700;
    }

    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(6px);
      border: 3px solid #fff;
      border-radius: 20px;
      padding: 12px;
      box-shadow: 0 8px 18px rgba(255, 107, 107, 0.14);
    }

    .controls-card {
      padding: 10px;
    }

    .label {
      display: block;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #ff6b6b;
    }

    select {
      width: 100%;
      border: 3px solid #ffd166;
      border-radius: 14px;
      padding: 10px 12px;
      font-size: 15px;
      background: #fffdf7;
      color: #5b3b00;
      font-weight: 700;
      outline: none;
    }

    .button-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 8px;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      transition: transform 0.05s ease, box-shadow 0.1s ease;
      box-shadow: 0 5px 0 rgba(0,0,0,0.08);
    }

    button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 rgba(0,0,0,0.08);
    }

    .start-btn {
      background: linear-gradient(180deg, #7ee787 0%, #2ecc71 100%);
      color: #fff;
    }

    .stop-btn {
      background: linear-gradient(180deg, #ffd6a5 0%, #ffad66 100%);
      color: #7a3900;
    }

    .status-card {
      text-align: center;
      padding: 12px;
      border-width: 4px;
      transition: background 0.2s ease, border-color 0.2s ease;
    }

    .status-badge {
      display: inline-block;
      width: 100%;
      padding: 10px 12px;
      border-radius: 999px;
      font-size: 18px;
      font-weight: 900;
      background: #fff3b0;
      color: #8a5a00;
      border: 3px solid #fff;
    }

    .result-card {
      text-align: center;
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, #ffffff 0%, #fff8ef 100%);
    }

    #result {
      font-size: 24px;
      font-weight: 900;
      color: #00a896;
      white-space: pre-line;
      word-break: break-word;
      text-shadow: 0 2px 0 #fff;
    }

    .reader-card {
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      min-height: 0;
    }

    #reader {
  width: 100%;
  max-width: 460px;
  height: min(52vh, 460px);
  overflow: hidden;
  border-radius: 18px;
}

#reader video {
  width: 100% !important;
  height: 100% !important;
  object-fit: contain !important;
}

    .footer-note {
      text-align: center;
      font-size: 12px;
      color: #8a5a00;
      font-weight: 700;
      padding-bottom: env(safe-area-inset-bottom);
    }

    .status-normal {
      border-color: #ffffff;
    }

    .status-success {
      border-color: #86efac;
      background: rgba(220, 252, 231, 0.92);
    }

    .status-error {
      border-color: #fca5a5;
      background: rgba(254, 226, 226, 0.92);
    }

    .status-duplicate {
      border-color: #facc15;
      background: rgba(254, 249, 195, 0.96);
    }

    .status-loading {
      border-color: #fde68a;
      background: rgba(254, 243, 199, 0.96);
    }

    @media (max-height: 780px) {
      .container {
        gap: 8px;
        padding: 8px 10px 10px;
      }

      .header h1 {
        font-size: 24px;
      }

      .header p {
        font-size: 12px;
      }

      #result {
        font-size: 22px;
      }

      .status-badge {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="emoji-row">🍴✨📱✨</div>
      <h1>社食レジ</h1>
      <p>QRコードをかざして受付してね！</p>
    </div>

    <div class="card controls-card">
      <label class="label" for="cameraSelect">📷 カメラをえらぶ</label>
      <select id="cameraSelect">
        <option>カメラを読み込み中...</option>
      </select>

      <div class="button-row">
        <button id="startBtn" class="start-btn">読み取りスタート</button>
        <button id="stopBtn" class="stop-btn">ストップ</button>
      </div>
    </div>

    <div id="statusCard" class="card status-card status-normal">
      <div id="msg" class="status-badge">カメラを選んで開始してね</div>
    </div>

    <div class="card result-card">
      <div id="result"></div>
    </div>

    <div class="card reader-card">
      <div id="reader"></div>
    </div>

    <div class="footer-note">
      読み取り後は自動で次の受付待ちになるよ
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwuHOAN8M8YdYFo7Wpex9wzEP5QRVsksSDKOuyq3Tyo1nBo6riHLrVs-9MADrZa-yvA/exec";

    const cameraSelect = document.getElementById("cameraSelect");
    const startBtn = document.getElementById("startBtn");
    const stopBtn = document.getElementById("stopBtn");
    const msg = document.getElementById("msg");
    const result = document.getElementById("result");
    const statusCard = document.getElementById("statusCard");

    let html5QrCode = null;
    let isRunning = false;
    let isProcessing = false;
    let resetTimer = null;
    let audioContext = null;

    function initAudio() {
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  if (!AudioCtx) return;

  if (!audioContext) {
    audioContext = new AudioCtx();
  }

  if (audioContext.state === "suspended") {
    audioContext.resume().catch(() => {});
  }

  // 無音の短いバッファで解放を安定させる
  const buffer = audioContext.createBuffer(1, 1, 22050);
  const source = audioContext.createBufferSource();
  source.buffer = buffer;
  source.connect(audioContext.destination);
  source.start(0);
}

    function beep(freq, start, duration, volume, type = "sine") {
      if (!audioContext) return;

      const osc = audioContext.createOscillator();
      const gain = audioContext.createGain();

      osc.type = type;
      osc.frequency.setValueAtTime(freq, start);

      gain.gain.setValueAtTime(0.0001, start);
      gain.gain.exponentialRampToValueAtTime(volume, start + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, start + duration);

      osc.connect(gain);
      gain.connect(audioContext.destination);

      osc.start(start);
      osc.stop(start + duration + 0.02);
    }

    function playSuccessSound() {
  if (!audioContext) return;
  const now = audioContext.currentTime;
  beep(1046, now, 0.12, 0.35, "triangle");
  beep(1568, now + 0.10, 0.18, 0.30, "triangle");
}

function playErrorSound() {
  if (!audioContext) return;
  const now = audioContext.currentTime;
  beep(320, now, 0.16, 0.28, "sawtooth");
  beep(220, now + 0.12, 0.22, 0.28, "sawtooth");
}

    function playErrorSound() {
      if (!audioContext) return;
      const now = audioContext.currentTime;
      beep(340, now, 0.18, 0.18, "sawtooth");
      beep(240, now + 0.14, 0.24, 0.18, "sawtooth");
    }

    function setStatus(text, mode = "normal") {
      msg.innerText = text;
      statusCard.className = "card status-card";

      if (mode === "success") {
        statusCard.classList.add("status-success");
        msg.style.background = "#d9ffd6";
        msg.style.color = "#18794e";
      } else if (mode === "error") {
        statusCard.classList.add("status-error");
        msg.style.background = "#ffd9de";
        msg.style.color = "#b42318";
      } else if (mode === "duplicate") {
        statusCard.classList.add("status-duplicate");
        msg.style.background = "#fff7b3";
        msg.style.color = "#8a5a00";
      } else if (mode === "loading") {
        statusCard.classList.add("status-loading");
        msg.style.background = "#fff1a8";
        msg.style.color = "#8a5a00";
      } else {
        statusCard.classList.add("status-normal");
        msg.style.background = "#fff3b0";
        msg.style.color = "#8a5a00";
      }
    }

    async function sendToGas(employeeId) {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 5000);

      try {
        const response = await fetch(GAS_URL, {
          method: "POST",
          headers: {
            "Content-Type": "text/plain;charset=utf-8"
          },
          body: JSON.stringify({ employeeId }),
          signal: controller.signal
        });

        const text = await response.text();
        return JSON.parse(text);
      } finally {
        clearTimeout(timeoutId);
      }
    }

    async function loadCameras() {
      try {
        setStatus("カメラ一覧を取得中...", "loading");

        const devices = await Html5Qrcode.getCameras();
        cameraSelect.innerHTML = "";

        if (!devices || devices.length === 0) {
          cameraSelect.innerHTML = "<option>カメラが見つかりません</option>";
          setStatus("カメラが見つかりません", "error");
          return;
        }

        devices.forEach((device, index) => {
          const option = document.createElement("option");
          option.value = device.id;
          option.textContent = device.label && device.label.trim()
            ? device.label
            : `カメラ ${index + 1}`;
          cameraSelect.appendChild(option);
        });

        setStatus("カメラを選んで開始してね");
      } catch (err) {
        console.error(err);
        setStatus("カメラ取得に失敗しました", "error");
      }
      const options = Array.from(cameraSelect.options);
const rearOption = options.find(opt =>
  !/front/i.test(opt.textContent)
);
if (rearOption) {
  cameraSelect.value = rearOption.value;
}
    }

    function scheduleReset() {
      if (resetTimer) clearTimeout(resetTimer);

      resetTimer = setTimeout(() => {
        result.innerText = "";
        setStatus("次のQRをどうぞ");
        isProcessing = false;
      }, 2200);
    }

    async function startScanner() {
      try {
        initAudio();

        if (isRunning) {
          setStatus("すでに読み取り中です");
          return;
        }

        const cameraId = cameraSelect.value;
        if (!cameraId) {
          setStatus("カメラを選んでください", "error");
          return;
        }

        result.innerText = "";
        setStatus("カメラを起動中...", "loading");

        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode("reader");
        }

        await html5QrCode.start(
          cameraId,
          {
            fps: 10,
            qrbox: 280
          },
          async (decodedText) => {
            if (isProcessing) return;
            isProcessing = true;

            try {
              result.innerText = "読み取りました";
              setStatus("登録中...", "loading");

              const res = await sendToGas(decodedText);

              if (res.ok) {
                result.innerText = "登録しました 🎉";
                setStatus("登録完了", "success");
                playSuccessSound();
              } else if (res.code === "ALREADY_CHECKED_IN") {
                result.innerText = "本日は登録ずみです";
                setStatus("今日はもう登録ずみです", "duplicate");
                playErrorSound();
              } else {
                result.innerText = "";
                setStatus("登録できませんでした", "error");
                playErrorSound();
              }
            } catch (err) {
              console.error(err);
              result.innerText = "";
              setStatus("登録できませんでした", "error");
              playErrorSound();
            } finally {
              scheduleReset();
            }
          },
          () => {
          }
        );

        isRunning = true;
        setStatus("QRを読み取ってね");
      } catch (err) {
        console.error(err);
        setStatus("カメラ起動エラー", "error");
      }
    }

    async function stopScanner() {
      try {
        if (!html5QrCode || !isRunning) {
          setStatus("停止中です");
          return;
        }

        await html5QrCode.stop();
        isRunning = false;
        isProcessing = false;

        if (resetTimer) {
          clearTimeout(resetTimer);
          resetTimer = null;
        }

        result.innerText = "";
        setStatus("停止しました");
      } catch (err) {
        console.error(err);
        setStatus("停止エラー", "error");
      }
    }

    startBtn.addEventListener("click", () => {
      initAudio();
      startScanner();
    });

    stopBtn.addEventListener("click", stopScanner);

    loadCameras();
  </script>
</body>
</html>
