<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>カクイチ社食レジ</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 20px;
    }
    #reader {
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
    }
    button {
      font-size: 18px;
      padding: 12px 20px;
      margin: 16px 0;
    }
    #result {
      margin-top: 20px;
      font-size: 20px;
      font-weight: bold;
      color: #0a7a2f;
      word-break: break-all;
    }
    #msg {
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <h1>🍴 社食レジ</h1>
  <button id="startBtn">QR読み取り開始</button>
  <div id="reader"></div>
  <p id="msg">ボタンを押してカメラを起動してください</p>
  <div id="result"></div>

  <script>
    const startBtn = document.getElementById("startBtn");
    const msg = document.getElementById("msg");
    const result = document.getElementById("result");

    let html5QrCode = null;
    let scanned = false;

    startBtn.addEventListener("click", async () => {
      try {
        msg.innerText = "カメラを起動しています...";
        result.innerText = "";
        scanned = false;

        if (!html5QrCode) {
          html5QrCode = new Html5Qrcode("reader");
        }

        await html5QrCode.start(
          { facingMode: "environment" },
          { fps: 10, qrbox: 250 },
          (decodedText) => {
            if (scanned) return;
            scanned = true;

            result.innerText = "読み取り結果: " + decodedText;
            msg.innerText = "✅ 読み取り成功";

            html5QrCode.stop().catch(() => {});
          },
          () => {}
        );
      } catch (err) {
        msg.innerText = "❌ エラー: " + err.name;
        console.error(err);
      }
    });
  </script>
</body>
</html>
